name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-2022
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      
      - name: Install MAUI
        run: |
          dotnet workload install maui --source https://api.nuget.org/v3/index.json
          dotnet workload install android --source https://api.nuget.org/v3/index.json
      
      - name: Restore packages
        run: dotnet restore ScheduleApp.csproj
      
      - name: Publish APK
        run: dotnet publish ScheduleApp.csproj -f net9.0-android -c Release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ScheduleApp
          path: bin/Release/net9.0-android/publish/*.apk
